name: Shadow Label Cleanup

on:
  pull_request:
    types: [synchronize]

jobs:
  remove-promoted:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove promoted label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/promoted \
            -X DELETE || true
