name: Shadow Promote

on:
  issue_comment:
    types: [created]

env:
  UPSTREAM_OWNER: ${{ secrets.UPSTREAM_OWNER }}
  UPSTREAM_REPO: ${{ secrets.UPSTREAM_REPO }}
  UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
  UPSTREAM_USER: ${{ secrets.UPSTREAM_USER }}
  PROXY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

jobs:
  dry-run:
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == '/promote'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/shadow-repo-workflow:latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0
      - run: shadow promote pr ${{ github.event.issue.number }} --dry-run

  promote:
    needs: dry-run
    environment: upstream-production
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/shadow-repo-workflow:latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0
      - run: shadow promote pr ${{ github.event.issue.number }}
